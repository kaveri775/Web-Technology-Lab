<!DOCTYPE html>
<html>
<head>
    <title>Kau's Calculator</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Removed gray background */
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .calculator {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        #display {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            font-size: 20px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: white; /* Removed gray from answer box */
            color: black;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .operator {
            background-color: orange;
            color: white;
        }

        .equal {
            background-color: green;
            color: white;
            grid-column: span 2;
        }

        .clear {
            background-color: red;
            color: white;
        }
    </style>
    <style>
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;

        /* Doraemon Background */
        background-image: url("doraemon.jpng");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    h1 {
        margin-bottom: 20px;
        color: white;
        text-shadow: 2px 2px 5px black;
    }

    .calculator {
        background: rgba(0, 0, 0, 0.8); /* Transparent black */
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    #display {
        width: 100%;
        height: 50px;
        margin-bottom: 10px;
        font-size: 20px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background-color: white;
        color: black;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 60px);
        gap: 10px;
    }

    button {
        height: 50px;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .operator {
        background-color: orange;
        color: white;
    }

    .equal {
        background-color: green;
        color: white;
        grid-column: span 2;
    }

    .clear {
        background-color: red;
        color: white;
    }
</style>

</head>
<body>

<h1>Simple Calculator</h1>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="appendValue('/')">/</button>
        <button onclick="appendValue('*')">*</button>
        <button onclick="appendValue('-')">-</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        try {
            document.getElementById("display").value =
                eval(document.getElementById("display").value);
        } catch {
            alert("Invalid Expression");
        }
    }
</script>

</body>
</html>
