<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Navbar */
        nav {
            background-color: #1e3a8a;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(to right, #3b82f6, #1e3a8a);
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            text-align: center;
        }

        .card {
            display: inline-block;
            width: 250px;
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px gray;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2563eb;
        }

        footer {
            background-color: #111827;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }

        /* Dark Mode */
        .dark-mode {
            background-color: #111827;
            color: white;
        }

        .dark-mode .card {
            background-color: #1f2937;
            color: white;
        }

    </style>
</head>
